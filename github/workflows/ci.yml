# GitHub Actions CI/CD pipeline
# Kører automatisk ved push og pull request til main.
# Trin: 1) Test begge services  2) Byg Docker images
#
# Dette opfylder opgavens krav om en CI/CD-tilgang der understøtter
# build, test og deployment. Deployment-trinnet er skitseret nederst —
# udfyld det når I har valgt cloud-target (fx Azure App Service / Railway).

name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contract_service, order_service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: pytest -v

  build:
    name: Build Docker images
    needs: test          # bygger kun hvis tests består
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contract_service, order_service]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t arla-row/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

