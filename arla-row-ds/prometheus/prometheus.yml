
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "arla-order-service"
    static_configs:
      - targets: ["order-service:8000"]

  - job_name: "arla-contract-service"
    static_configs:
      - targets: ["contract-service:8001"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]