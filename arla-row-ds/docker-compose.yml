# Orkestrerer hele løsningen lokalt: to services + PostgreSQL.
# Kør med:  docker-compose up --build
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arla_row
      POSTGRES_USER: arla
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arla}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arla -d arla_row"]
      interval: 5s
      timeout: 3s
      retries: 5

  contract-service:
    build: ./contract_service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://arla:${DB_PASSWORD:-arla}@postgres:5432/arla_row
      API_KEY: ${CONTRACT_API_KEY:-dev-contract-key}
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./order_service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://arla:${DB_PASSWORD:-arla}@postgres:5432/arla_row
      API_KEY: ${ORDER_API_KEY:-dev-order-key}
      CONTRACT_SERVICE_URL: http://contract-service:8001
      CONTRACT_SERVICE_API_KEY: ${CONTRACT_API_KEY:-dev-contract-key}
    depends_on:
      postgres:
        condition: service_healthy
      contract-service:
        condition: service_started

volumes:
  pgdata:
