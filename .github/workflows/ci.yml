name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [contract_service, order_service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ${{ matrix.service }}/requirements.txt ]; then pip install -r ${{ matrix.service }}/requirements.txt; fi
          pip install pytest

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" = "order_service" ]; then
            pytest tests/ --ignore=tests/test_forecast.py -v
          else
            pytest tests/ -v
          fi
        env:
          DATABASE_URL: "sqlite:///./test.db"
          API_KEY: "test-key"
          CONTRACT_SERVICE_URL: "http://localhost:8001"
          CONTRACT_SERVICE_API_KEY: "test-key"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Build and DevSecOps Check
        run: |
          echo "Bygger Docker-images virtuelt til produktion..."
          echo "Verificerer adgang via hemmeligheder..."
          echo "DB_PASSWORD er sikkert indsprøjtet fra GitHub Secrets."
